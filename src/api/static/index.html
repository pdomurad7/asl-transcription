<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload</title>
</head>
<body>
    <h1>Upload a File</h1>
    <form id="upload-form">
        <label for="file">Select a file:</label>
        <input type="file" name="file" id="file" required>
        <br>
        <label for="model_type">Model Type:</label>
        <input type="text" name="model_type" id="model_type" required>
        <br>
        <label for="model_path">Model Path:</label>
        <input type="text" name="model_path" id="model_path" required>
        <br>
        <label for="letters_batch_size">Letters Batch Size:</label>
        <input type="number" name="letters_batch_size" id="letters_batch_size" required>
        <br>
        <label for="letters_amount_to_approve">Letters Amount to Approve:</label>
        <input type="number" name="letters_amount_to_approve" id="letters_amount_to_approve" required>
        <br>
        <button type="submit">Upload</button>
    </form>

    <script>
    document.getElementById('upload-form').addEventListener('submit', function(event) {
        event.preventDefault();

        const fileInput = document.getElementById('file');
        const modelTypeInput = document.getElementById('model_type');
        const modelPathInput = document.getElementById('model_path');
        const lettersBatchSizeInput = document.getElementById('letters_batch_size');
        const lettersAmountToApproveInput = document.getElementById('letters_amount_to_approve');

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        const config = {
            model_type: modelTypeInput.value,
            model_path: modelPathInput.value,
            letters_batch_size: lettersBatchSizeInput.value,
            letters_amount_to_approve: lettersAmountToApproveInput.value,
        };

        fetch('http://127.0.0.1:8000/file', {
            method: 'POST',
            body: JSON.stringify({
                file: formData,
                config: config,
            }),
            headers: {
                'Content-Type': 'application/json'
            }
        }).then(response => response.json()).then(data => console.log(data));
    });
    </script>
</body>
</html>
